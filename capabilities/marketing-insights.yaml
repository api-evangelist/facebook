naftiko: 1.0.0-alpha2
info:
  label: Facebook Marketing API — Insights
  description: 'Facebook Marketing API — Insights. 1 operations. Lead operation: Facebook Get Account Insights. Self-contained
    Naftiko capability covering one Facebook business surface.'
  tags:
  - Facebook
  - Insights
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_API_KEY: FACEBOOK_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-insights
    baseUri: https://graph.facebook.com/v21.0
    description: Facebook Marketing API — Insights business capability. Self-contained, no shared references.
    resources:
    - name: act_{ad-account-id}-insights
      path: /act_{ad-account-id}/insights
      operations:
      - name: getaccountinsights
        method: GET
        description: Facebook Get Account Insights
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ad-account-id
          in: path
          type: string
          description: The ad account ID.
          required: true
        - name: date_preset
          in: query
          type: string
          description: Predefined date range for insights.
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_API_KEY}}'
  exposes:
  - type: rest
    namespace: marketing-insights-rest
    port: 8080
    description: REST adapter for Facebook Marketing API — Insights. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/act-ad-account-id/insights
      name: act-ad-account-id-insights
      description: REST surface for act_{ad-account-id}-insights.
      operations:
      - method: GET
        name: getaccountinsights
        description: Facebook Get Account Insights
        call: marketing-insights.getaccountinsights
        with:
          ad-account-id: rest.ad-account-id
          date_preset: rest.date_preset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-insights-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook Marketing API — Insights. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: facebook-get-account-insights
      description: Facebook Get Account Insights
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-insights.getaccountinsights
      with:
        ad-account-id: tools.ad-account-id
        date_preset: tools.date_preset
      outputParameters:
      - type: object
        mapping: $.
