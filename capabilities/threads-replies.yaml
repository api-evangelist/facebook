naftiko: 1.0.0-alpha2
info:
  label: Facebook Threads API — Replies
  description: 'Facebook Threads API — Replies. 1 operations. Lead operation: Facebook Get Threads Replies. Self-contained
    Naftiko capability covering one Facebook business surface.'
  tags:
  - Facebook
  - Replies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_API_KEY: FACEBOOK_API_KEY
capability:
  consumes:
  - type: http
    namespace: threads-replies
    baseUri: https://graph.threads.net/v1.0
    description: Facebook Threads API — Replies business capability. Self-contained, no shared references.
    resources:
    - name: threads-media-id-replies
      path: /{threads-media-id}/replies
      operations:
      - name: getthreadsreplies
        method: GET
        description: Facebook Get Threads Replies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: threads-media-id
          in: path
          type: string
          description: The Threads media ID.
          required: true
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_API_KEY}}'
  exposes:
  - type: rest
    namespace: threads-replies-rest
    port: 8080
    description: REST adapter for Facebook Threads API — Replies. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{threads-media-id}/replies
      name: threads-media-id-replies
      description: REST surface for threads-media-id-replies.
      operations:
      - method: GET
        name: getthreadsreplies
        description: Facebook Get Threads Replies
        call: threads-replies.getthreadsreplies
        with:
          threads-media-id: rest.threads-media-id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: threads-replies-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook Threads API — Replies. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: facebook-get-threads-replies
      description: Facebook Get Threads Replies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: threads-replies.getthreadsreplies
      with:
        threads-media-id: tools.threads-media-id
      outputParameters:
      - type: object
        mapping: $.
