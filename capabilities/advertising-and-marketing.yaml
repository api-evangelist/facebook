naftiko: 1.0.0-alpha2
info:
  label: Facebook Advertising and Marketing
  description: Workflow capability for managing advertising campaigns across Facebook and Instagram. Combines Marketing API
    for campaign management with Graph API for content insights and Instagram API for visual ad performance. Used by marketing
    managers and ad operations teams.
  tags:
  - Facebook
  - Advertising
  - Marketing
  - Campaigns
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    FACEBOOK_MARKETING_TOKEN: FACEBOOK_MARKETING_TOKEN
    FACEBOOK_ACCESS_TOKEN: FACEBOOK_ACCESS_TOKEN
    INSTAGRAM_ACCESS_TOKEN: INSTAGRAM_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: marketing-api
    baseUri: https://graph.facebook.com/v21.0
    description: Facebook Marketing API v21.0.
    authentication:
      type: bearer
      token: '{{FACEBOOK_MARKETING_TOKEN}}'
    resources:
    - name: campaigns
      path: /
      description: Campaign management.
      operations:
      - name: list-campaigns
        method: GET
        description: List campaigns for an ad account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-campaign
        method: POST
        description: Create a new campaign.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: insights
      path: /
      description: Performance insights.
      operations:
      - name: get-account-insights
        method: GET
        description: Get advertising insights for an ad account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: audiences
      path: /
      description: Audience management.
      operations:
      - name: list-custom-audiences
        method: GET
        description: List custom audiences.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-custom-audience
        method: POST
        description: Create a custom audience.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: graph-api
    baseUri: https://graph.facebook.com/v21.0
    description: Facebook Graph API v21.0.
    authentication:
      type: bearer
      token: '{{FACEBOOK_ACCESS_TOKEN}}'
    resources:
    - name: users
      path: /
      description: User profile operations.
      operations:
      - name: get-current-user
        method: GET
        description: Get the current authenticated user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-user
        method: GET
        description: Get a user by ID.
        inputParameters:
        - name: user_id
          in: path
          type: string
          required: true
          description: User ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: posts
      path: /
      description: Post operations.
      operations:
      - name: get-user-feed
        method: GET
        description: Get posts from a user's feed.
        inputParameters:
        - name: user_id
          in: path
          type: string
          required: true
          description: User ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-post
        method: POST
        description: Create a new post.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-post
        method: DELETE
        description: Delete a post.
        inputParameters:
        - name: post_id
          in: path
          type: string
          required: true
          description: Post ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: comments
      path: /
      description: Comment operations.
      operations:
      - name: get-post-comments
        method: GET
        description: Get comments on a post.
        inputParameters:
        - name: post_id
          in: path
          type: string
          required: true
          description: Post ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-comment
        method: POST
        description: Create a comment on a post.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: instagram-api
    baseUri: https://graph.facebook.com/v21.0
    description: Instagram API via Graph API v21.0.
    authentication:
      type: bearer
      token: '{{INSTAGRAM_ACCESS_TOKEN}}'
    resources:
    - name: media
      path: /
      description: Media management.
      operations:
      - name: list-media
        method: GET
        description: List Instagram media.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-media
        method: POST
        description: Create an Instagram media container.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: publish-media
        method: POST
        description: Publish a media container.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: insights
      path: /
      description: Account insights.
      operations:
      - name: get-insights
        method: GET
        description: Get Instagram account insights.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8081
    namespace: advertising-api
    description: Unified REST API for Facebook advertising and marketing.
    resources:
    - path: /v1/campaigns
      name: campaigns
      description: Campaign management.
      operations:
      - method: GET
        name: list-campaigns
        description: List advertising campaigns.
        call: marketing-api.list-campaigns
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-campaign
        description: Create a campaign.
        call: marketing-api.create-campaign
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/insights
      name: insights
      description: Performance insights.
      operations:
      - method: GET
        name: get-insights
        description: Get advertising insights.
        call: marketing-api.get-account-insights
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/audiences
      name: audiences
      description: Audience management.
      operations:
      - method: GET
        name: list-audiences
        description: List custom audiences.
        call: marketing-api.list-custom-audiences
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9081
    namespace: advertising-mcp
    transport: http
    description: MCP server for AI-assisted advertising management.
    tools:
    - name: list-campaigns
      description: List all advertising campaigns.
      hints:
        readOnly: true
      call: marketing-api.list-campaigns
      outputParameters:
      - type: object
        mapping: $.
    - name: create-campaign
      description: Create a new advertising campaign.
      hints:
        readOnly: false
      call: marketing-api.create-campaign
      outputParameters:
      - type: object
        mapping: $.
    - name: get-ad-insights
      description: Get advertising performance insights.
      hints:
        readOnly: true
      call: marketing-api.get-account-insights
      outputParameters:
      - type: object
        mapping: $.
    - name: list-custom-audiences
      description: List custom audiences for targeting.
      hints:
        readOnly: true
      call: marketing-api.list-custom-audiences
      outputParameters:
      - type: object
        mapping: $.
    - name: create-custom-audience
      description: Create a new custom audience.
      hints:
        readOnly: false
      call: marketing-api.create-custom-audience
      outputParameters:
      - type: object
        mapping: $.
