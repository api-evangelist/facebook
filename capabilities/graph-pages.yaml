naftiko: 1.0.0-alpha2
info:
  label: Facebook Graph API — Pages
  description: 'Facebook Graph API — Pages. 2 operations. Lead operation: Facebook Get Page. Self-contained Naftiko capability
    covering one Facebook business surface.'
  tags:
  - Facebook
  - Pages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_API_KEY: FACEBOOK_API_KEY
capability:
  consumes:
  - type: http
    namespace: graph-pages
    baseUri: https://graph.facebook.com/v21.0
    description: Facebook Graph API — Pages business capability. Self-contained, no shared references.
    resources:
    - name: page-id
      path: /{page-id}
      operations:
      - name: getpage
        method: GET
        description: Facebook Get Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page-id
          in: path
          type: string
          description: The page ID.
          required: true
        - name: fields
          in: query
          type: string
          description: Comma-separated list of fields to return.
    - name: page-id-feed
      path: /{page-id}/feed
      operations:
      - name: getpagefeed
        method: GET
        description: Facebook Get Page Feed
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page-id
          in: path
          type: string
          description: The page ID.
          required: true
        - name: limit
          in: query
          type: integer
          description: Maximum number of posts to return.
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_API_KEY}}'
  exposes:
  - type: rest
    namespace: graph-pages-rest
    port: 8080
    description: REST adapter for Facebook Graph API — Pages. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/{page-id}
      name: page-id
      description: REST surface for page-id.
      operations:
      - method: GET
        name: getpage
        description: Facebook Get Page
        call: graph-pages.getpage
        with:
          page-id: rest.page-id
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{page-id}/feed
      name: page-id-feed
      description: REST surface for page-id-feed.
      operations:
      - method: GET
        name: getpagefeed
        description: Facebook Get Page Feed
        call: graph-pages.getpagefeed
        with:
          page-id: rest.page-id
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: graph-pages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook Graph API — Pages. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: facebook-get-page
      description: Facebook Get Page
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: graph-pages.getpage
      with:
        page-id: tools.page-id
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-get-page-feed
      description: Facebook Get Page Feed
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: graph-pages.getpagefeed
      with:
        page-id: tools.page-id
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
