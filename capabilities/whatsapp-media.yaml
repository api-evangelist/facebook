naftiko: 1.0.0-alpha2
info:
  label: Facebook WhatsApp Business API — Media
  description: 'Facebook WhatsApp Business API — Media. 1 operations. Lead operation: Facebook Upload WhatsApp Media. Self-contained
    Naftiko capability covering one Facebook business surface.'
  tags:
  - Facebook
  - Media
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_API_KEY: FACEBOOK_API_KEY
capability:
  consumes:
  - type: http
    namespace: whatsapp-media
    baseUri: https://graph.facebook.com/v21.0
    description: Facebook WhatsApp Business API — Media business capability. Self-contained, no shared references.
    resources:
    - name: phone-number-id-media
      path: /{phone-number-id}/media
      operations:
      - name: uploadwhatsappmedia
        method: POST
        description: Facebook Upload WhatsApp Media
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: phone-number-id
          in: path
          type: string
          description: The phone number ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_API_KEY}}'
  exposes:
  - type: rest
    namespace: whatsapp-media-rest
    port: 8080
    description: REST adapter for Facebook WhatsApp Business API — Media. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{phone-number-id}/media
      name: phone-number-id-media
      description: REST surface for phone-number-id-media.
      operations:
      - method: POST
        name: uploadwhatsappmedia
        description: Facebook Upload WhatsApp Media
        call: whatsapp-media.uploadwhatsappmedia
        with:
          phone-number-id: rest.phone-number-id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: whatsapp-media-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook WhatsApp Business API — Media. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: facebook-upload-whatsapp-media
      description: Facebook Upload WhatsApp Media
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: whatsapp-media.uploadwhatsappmedia
      with:
        phone-number-id: tools.phone-number-id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
