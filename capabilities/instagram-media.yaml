naftiko: 1.0.0-alpha2
info:
  label: Facebook Instagram API — Media
  description: 'Facebook Instagram API — Media. 3 operations. Lead operation: Facebook List Instagram Media. Self-contained
    Naftiko capability covering one Facebook business surface.'
  tags:
  - Facebook
  - Media
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_API_KEY: FACEBOOK_API_KEY
capability:
  consumes:
  - type: http
    namespace: instagram-media
    baseUri: https://graph.facebook.com/v21.0
    description: Facebook Instagram API — Media business capability. Self-contained, no shared references.
    resources:
    - name: ig-user-id-media
      path: /{ig-user-id}/media
      operations:
      - name: listinstagrammedia
        method: GET
        description: Facebook List Instagram Media
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ig-user-id
          in: path
          type: string
          description: The Instagram user ID.
          required: true
        - name: limit
          in: query
          type: integer
          description: Maximum number of media to return.
      - name: createinstagrammedia
        method: POST
        description: Facebook Create Instagram Media
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ig-user-id
          in: path
          type: string
          description: The Instagram user ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: ig-user-id-media_publish
      path: /{ig-user-id}/media_publish
      operations:
      - name: publishinstagrammedia
        method: POST
        description: Facebook Publish Instagram Media
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ig-user-id
          in: path
          type: string
          description: The Instagram user ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_API_KEY}}'
  exposes:
  - type: rest
    namespace: instagram-media-rest
    port: 8080
    description: REST adapter for Facebook Instagram API — Media. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{ig-user-id}/media
      name: ig-user-id-media
      description: REST surface for ig-user-id-media.
      operations:
      - method: GET
        name: listinstagrammedia
        description: Facebook List Instagram Media
        call: instagram-media.listinstagrammedia
        with:
          ig-user-id: rest.ig-user-id
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createinstagrammedia
        description: Facebook Create Instagram Media
        call: instagram-media.createinstagrammedia
        with:
          ig-user-id: rest.ig-user-id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{ig-user-id}/media-publish
      name: ig-user-id-media-publish
      description: REST surface for ig-user-id-media_publish.
      operations:
      - method: POST
        name: publishinstagrammedia
        description: Facebook Publish Instagram Media
        call: instagram-media.publishinstagrammedia
        with:
          ig-user-id: rest.ig-user-id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: instagram-media-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook Instagram API — Media. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: facebook-list-instagram-media
      description: Facebook List Instagram Media
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: instagram-media.listinstagrammedia
      with:
        ig-user-id: tools.ig-user-id
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-create-instagram-media
      description: Facebook Create Instagram Media
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: instagram-media.createinstagrammedia
      with:
        ig-user-id: tools.ig-user-id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-publish-instagram-media
      description: Facebook Publish Instagram Media
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: instagram-media.publishinstagrammedia
      with:
        ig-user-id: tools.ig-user-id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
