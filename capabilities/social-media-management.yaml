naftiko: 1.0.0-alpha2
info:
  label: Facebook Social Media Management
  description: Workflow capability for managing content across Facebook, Instagram, and Threads. Combines Graph API for Facebook
    posts, Instagram API for visual content, and Threads API for text-based publishing. Used by social media managers and
    content creators.
  tags:
  - Facebook
  - Social Media
  - Content Management
  - Publishing
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    FACEBOOK_ACCESS_TOKEN: FACEBOOK_ACCESS_TOKEN
    INSTAGRAM_ACCESS_TOKEN: INSTAGRAM_ACCESS_TOKEN
    THREADS_ACCESS_TOKEN: THREADS_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: graph-api
    baseUri: https://graph.facebook.com/v21.0
    description: Facebook Graph API v21.0.
    authentication:
      type: bearer
      token: '{{FACEBOOK_ACCESS_TOKEN}}'
    resources:
    - name: users
      path: /
      description: User profile operations.
      operations:
      - name: get-current-user
        method: GET
        description: Get the current authenticated user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-user
        method: GET
        description: Get a user by ID.
        inputParameters:
        - name: user_id
          in: path
          type: string
          required: true
          description: User ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: posts
      path: /
      description: Post operations.
      operations:
      - name: get-user-feed
        method: GET
        description: Get posts from a user's feed.
        inputParameters:
        - name: user_id
          in: path
          type: string
          required: true
          description: User ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-post
        method: POST
        description: Create a new post.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-post
        method: DELETE
        description: Delete a post.
        inputParameters:
        - name: post_id
          in: path
          type: string
          required: true
          description: Post ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: comments
      path: /
      description: Comment operations.
      operations:
      - name: get-post-comments
        method: GET
        description: Get comments on a post.
        inputParameters:
        - name: post_id
          in: path
          type: string
          required: true
          description: Post ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-comment
        method: POST
        description: Create a comment on a post.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: instagram-api
    baseUri: https://graph.facebook.com/v21.0
    description: Instagram API via Graph API v21.0.
    authentication:
      type: bearer
      token: '{{INSTAGRAM_ACCESS_TOKEN}}'
    resources:
    - name: media
      path: /
      description: Media management.
      operations:
      - name: list-media
        method: GET
        description: List Instagram media.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-media
        method: POST
        description: Create an Instagram media container.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: publish-media
        method: POST
        description: Publish a media container.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: insights
      path: /
      description: Account insights.
      operations:
      - name: get-insights
        method: GET
        description: Get Instagram account insights.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: threads-api
    baseUri: https://graph.threads.net/v1.0
    description: Threads API v1.0.
    authentication:
      type: bearer
      token: '{{THREADS_ACCESS_TOKEN}}'
    resources:
    - name: publishing
      path: /
      description: Content publishing.
      operations:
      - name: create-media
        method: POST
        description: Create a Threads media container.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: publish-media
        method: POST
        description: Publish a Threads media container.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: replies
      path: /
      description: Reply management.
      operations:
      - name: get-replies
        method: GET
        description: Get replies to a Threads post.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: insights
      path: /
      description: Performance insights.
      operations:
      - name: get-insights
        method: GET
        description: Get Threads insights.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: social-media-api
    description: Unified REST API for social media management across Meta platforms.
    resources:
    - path: /v1/posts
      name: posts
      description: Facebook post management.
      operations:
      - method: GET
        name: list-posts
        description: Get posts from a user's feed.
        call: graph-api.get-user-feed
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-post
        description: Create a new Facebook post.
        call: graph-api.create-post
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/instagram-media
      name: instagram-media
      description: Instagram content management.
      operations:
      - method: GET
        name: list-instagram-media
        description: List Instagram media.
        call: instagram-api.list-media
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: publish-instagram-media
        description: Publish Instagram media.
        call: instagram-api.publish-media
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/threads
      name: threads
      description: Threads content management.
      operations:
      - method: POST
        name: create-threads-post
        description: Create a Threads post.
        call: threads-api.create-media
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: social-media-mcp
    transport: http
    description: MCP server for AI-assisted social media management.
    tools:
    - name: get-facebook-feed
      description: Get posts from a Facebook user's feed.
      hints:
        readOnly: true
      call: graph-api.get-user-feed
      outputParameters:
      - type: object
        mapping: $.
    - name: create-facebook-post
      description: Create a new Facebook post.
      hints:
        readOnly: false
      call: graph-api.create-post
      outputParameters:
      - type: object
        mapping: $.
    - name: list-instagram-media
      description: List Instagram media for an account.
      hints:
        readOnly: true
      call: instagram-api.list-media
      outputParameters:
      - type: object
        mapping: $.
    - name: create-instagram-media
      description: Create and publish Instagram content.
      hints:
        readOnly: false
      call: instagram-api.create-media
      outputParameters:
      - type: object
        mapping: $.
    - name: get-instagram-insights
      description: Get Instagram performance insights.
      hints:
        readOnly: true
      call: instagram-api.get-insights
      outputParameters:
      - type: object
        mapping: $.
    - name: create-threads-post
      description: Create a new Threads post.
      hints:
        readOnly: false
      call: threads-api.create-media
      outputParameters:
      - type: object
        mapping: $.
    - name: get-threads-insights
      description: Get Threads performance insights.
      hints:
        readOnly: true
      call: threads-api.get-insights
      outputParameters:
      - type: object
        mapping: $.
