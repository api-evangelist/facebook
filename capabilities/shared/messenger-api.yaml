naftiko: "1.0.0-alpha1"

info:
  label: Facebook Messenger Platform API
  description: >-
    Shared capability for Messenger Platform API providing messaging, profile
    management, and conversation handling.
  tags:
    - Facebook
    - Messenger
    - Messaging
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MESSENGER_PAGE_TOKEN: MESSENGER_PAGE_TOKEN

capability:
  consumes:
    - type: http
      namespace: messenger-api
      baseUri: https://graph.facebook.com/v21.0
      description: "Messenger Platform API v21.0."
      authentication:
        type: bearer
        token: "{{MESSENGER_PAGE_TOKEN}}"
      resources:
        - name: messages
          path: /
          description: "Message sending."
          operations:
            - name: send-message
              method: POST
              description: "Send a message to a user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: conversations
          path: /
          description: "Conversation management."
          operations:
            - name: list-conversations
              method: GET
              description: "List conversations for a page."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9103
      namespace: messenger-api-mcp
      transport: http
      tools:
        - name: send-message
          description: "Send a Messenger message to a user."
          hints:
            readOnly: false
          call: "messenger-api.send-message"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-conversations
          description: "List Messenger conversations."
          hints:
            readOnly: true
          call: "messenger-api.list-conversations"
          outputParameters:
            - type: object
              mapping: "$."
