naftiko: "1.0.0-alpha1"

info:
  label: Facebook Threads API
  description: >-
    Shared capability for Threads API providing content publishing, reply
    management, and insights for Threads profiles.
  tags:
    - Facebook
    - Threads
    - Content Publishing
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      THREADS_ACCESS_TOKEN: THREADS_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: threads-api
      baseUri: https://graph.threads.net/v1.0
      description: "Threads API v1.0."
      authentication:
        type: bearer
        token: "{{THREADS_ACCESS_TOKEN}}"
      resources:
        - name: publishing
          path: /
          description: "Content publishing."
          operations:
            - name: create-media
              method: POST
              description: "Create a Threads media container."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: publish-media
              method: POST
              description: "Publish a Threads media container."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: replies
          path: /
          description: "Reply management."
          operations:
            - name: get-replies
              method: GET
              description: "Get replies to a Threads post."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: insights
          path: /
          description: "Performance insights."
          operations:
            - name: get-insights
              method: GET
              description: "Get Threads insights."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9105
      namespace: threads-api-mcp
      transport: http
      tools:
        - name: create-threads-post
          description: "Create a new Threads post."
          hints:
            readOnly: false
          call: "threads-api.create-media"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-threads-replies
          description: "Get replies to a Threads post."
          hints:
            readOnly: true
          call: "threads-api.get-replies"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-threads-insights
          description: "Get Threads performance insights."
          hints:
            readOnly: true
          call: "threads-api.get-insights"
          outputParameters:
            - type: object
              mapping: "$."
