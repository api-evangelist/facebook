naftiko: 1.0.0-alpha2
info:
  label: Facebook Messenger Platform API — Profile
  description: 'Facebook Messenger Platform API — Profile. 2 operations. Lead operation: Facebook Get Messenger Profile. Self-contained
    Naftiko capability covering one Facebook business surface.'
  tags:
  - Facebook
  - Profile
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_API_KEY: FACEBOOK_API_KEY
capability:
  consumes:
  - type: http
    namespace: messenger-profile
    baseUri: https://graph.facebook.com/v21.0
    description: Facebook Messenger Platform API — Profile business capability. Self-contained, no shared references.
    resources:
    - name: page-id-messenger_profile
      path: /{page-id}/messenger_profile
      operations:
      - name: getmessengerprofile
        method: GET
        description: Facebook Get Messenger Profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page-id
          in: path
          type: string
          description: The page ID.
          required: true
        - name: fields
          in: query
          type: string
          description: Comma-separated list of profile fields.
      - name: updatemessengerprofile
        method: POST
        description: Facebook Update Messenger Profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page-id
          in: path
          type: string
          description: The page ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_API_KEY}}'
  exposes:
  - type: rest
    namespace: messenger-profile-rest
    port: 8080
    description: REST adapter for Facebook Messenger Platform API — Profile. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/{page-id}/messenger-profile
      name: page-id-messenger-profile
      description: REST surface for page-id-messenger_profile.
      operations:
      - method: GET
        name: getmessengerprofile
        description: Facebook Get Messenger Profile
        call: messenger-profile.getmessengerprofile
        with:
          page-id: rest.page-id
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updatemessengerprofile
        description: Facebook Update Messenger Profile
        call: messenger-profile.updatemessengerprofile
        with:
          page-id: rest.page-id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: messenger-profile-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook Messenger Platform API — Profile. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: facebook-get-messenger-profile
      description: Facebook Get Messenger Profile
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: messenger-profile.getmessengerprofile
      with:
        page-id: tools.page-id
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-update-messenger-profile
      description: Facebook Update Messenger Profile
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: messenger-profile.updatemessengerprofile
      with:
        page-id: tools.page-id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
