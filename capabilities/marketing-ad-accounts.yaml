naftiko: 1.0.0-alpha2
info:
  label: Facebook Marketing API — Ad Accounts
  description: 'Facebook Marketing API — Ad Accounts. 1 operations. Lead operation: Facebook Get Ad Account. Self-contained
    Naftiko capability covering one Facebook business surface.'
  tags:
  - Facebook
  - Ad Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_API_KEY: FACEBOOK_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-ad-accounts
    baseUri: https://graph.facebook.com/v21.0
    description: Facebook Marketing API — Ad Accounts business capability. Self-contained, no shared references.
    resources:
    - name: act_{ad-account-id}
      path: /act_{ad-account-id}
      operations:
      - name: getadaccount
        method: GET
        description: Facebook Get Ad Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ad-account-id
          in: path
          type: string
          description: The ad account ID.
          required: true
        - name: fields
          in: query
          type: string
          description: Comma-separated list of fields to return.
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_API_KEY}}'
  exposes:
  - type: rest
    namespace: marketing-ad-accounts-rest
    port: 8080
    description: REST adapter for Facebook Marketing API — Ad Accounts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/act-ad-account-id
      name: act-ad-account-id
      description: REST surface for act_{ad-account-id}.
      operations:
      - method: GET
        name: getadaccount
        description: Facebook Get Ad Account
        call: marketing-ad-accounts.getadaccount
        with:
          ad-account-id: rest.ad-account-id
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-ad-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook Marketing API — Ad Accounts. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: facebook-get-ad-account
      description: Facebook Get Ad Account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-ad-accounts.getadaccount
      with:
        ad-account-id: tools.ad-account-id
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
