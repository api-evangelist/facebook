naftiko: 1.0.0-alpha2
info:
  label: Facebook Marketing API — Audiences
  description: 'Facebook Marketing API — Audiences. 2 operations. Lead operation: Facebook List Custom Audiences. Self-contained
    Naftiko capability covering one Facebook business surface.'
  tags:
  - Facebook
  - Audiences
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_API_KEY: FACEBOOK_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-audiences
    baseUri: https://graph.facebook.com/v21.0
    description: Facebook Marketing API — Audiences business capability. Self-contained, no shared references.
    resources:
    - name: act_{ad-account-id}-customaudiences
      path: /act_{ad-account-id}/customaudiences
      operations:
      - name: listcustomaudiences
        method: GET
        description: Facebook List Custom Audiences
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ad-account-id
          in: path
          type: string
          description: The ad account ID.
          required: true
      - name: createcustomaudience
        method: POST
        description: Facebook Create Custom Audience
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ad-account-id
          in: path
          type: string
          description: The ad account ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_API_KEY}}'
  exposes:
  - type: rest
    namespace: marketing-audiences-rest
    port: 8080
    description: REST adapter for Facebook Marketing API — Audiences. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/act-ad-account-id/customaudiences
      name: act-ad-account-id-customaudiences
      description: REST surface for act_{ad-account-id}-customaudiences.
      operations:
      - method: GET
        name: listcustomaudiences
        description: Facebook List Custom Audiences
        call: marketing-audiences.listcustomaudiences
        with:
          ad-account-id: rest.ad-account-id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcustomaudience
        description: Facebook Create Custom Audience
        call: marketing-audiences.createcustomaudience
        with:
          ad-account-id: rest.ad-account-id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-audiences-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook Marketing API — Audiences. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: facebook-list-custom-audiences
      description: Facebook List Custom Audiences
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-audiences.listcustomaudiences
      with:
        ad-account-id: tools.ad-account-id
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-create-custom-audience
      description: Facebook Create Custom Audience
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-audiences.createcustomaudience
      with:
        ad-account-id: tools.ad-account-id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
