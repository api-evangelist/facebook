naftiko: "1.0.0-alpha1"

info:
  label: Facebook Messaging and Communication
  description: >-
    Workflow capability for customer messaging across Messenger and WhatsApp.
    Combines Messenger Platform API for Facebook/Instagram messaging with
    WhatsApp Business API for business communication. Used by customer support
    teams and conversational commerce platforms.
  tags:
    - Facebook
    - Messaging
    - Customer Communication
    - WhatsApp
    - Messenger
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MESSENGER_PAGE_TOKEN: MESSENGER_PAGE_TOKEN
      WHATSAPP_ACCESS_TOKEN: WHATSAPP_ACCESS_TOKEN

capability:
  consumes:
    - import: messenger-api
      location: ./shared/messenger-api.yaml
    - import: whatsapp-api
      location: ./shared/whatsapp-api.yaml

  exposes:
    - type: rest
      port: 8082
      namespace: messaging-api
      description: "Unified REST API for cross-platform messaging."
      resources:
        - path: /v1/messenger-messages
          name: messenger-messages
          description: "Messenger messaging."
          operations:
            - method: POST
              name: send-messenger-message
              description: "Send a Messenger message."
              call: "messenger-api.send-message"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/whatsapp-messages
          name: whatsapp-messages
          description: "WhatsApp messaging."
          operations:
            - method: POST
              name: send-whatsapp-message
              description: "Send a WhatsApp message."
              call: "whatsapp-api.send-message"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/conversations
          name: conversations
          description: "Conversation management."
          operations:
            - method: GET
              name: list-conversations
              description: "List Messenger conversations."
              call: "messenger-api.list-conversations"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/templates
          name: templates
          description: "WhatsApp template management."
          operations:
            - method: GET
              name: list-templates
              description: "List WhatsApp message templates."
              call: "whatsapp-api.list-templates"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9082
      namespace: messaging-mcp
      transport: http
      description: "MCP server for AI-assisted customer messaging."
      tools:
        - name: send-messenger-message
          description: "Send a message via Facebook Messenger."
          hints:
            readOnly: false
          call: "messenger-api.send-message"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-whatsapp-message
          description: "Send a message via WhatsApp Business."
          hints:
            readOnly: false
          call: "whatsapp-api.send-message"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-messenger-conversations
          description: "List Messenger conversations."
          hints:
            readOnly: true
          call: "messenger-api.list-conversations"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-whatsapp-templates
          description: "List WhatsApp message templates."
          hints:
            readOnly: true
          call: "whatsapp-api.list-templates"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-whatsapp-template
          description: "Create a WhatsApp message template."
          hints:
            readOnly: false
          call: "whatsapp-api.create-template"
          outputParameters:
            - type: object
              mapping: "$."
