naftiko: 1.0.0-alpha2
info:
  label: Facebook Graph API — Users
  description: 'Facebook Graph API — Users. 2 operations. Lead operation: Facebook Get Current User. Self-contained Naftiko
    capability covering one Facebook business surface.'
  tags:
  - Facebook
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_API_KEY: FACEBOOK_API_KEY
capability:
  consumes:
  - type: http
    namespace: graph-users
    baseUri: https://graph.facebook.com/v21.0
    description: Facebook Graph API — Users business capability. Self-contained, no shared references.
    resources:
    - name: me
      path: /me
      operations:
      - name: getcurrentuser
        method: GET
        description: Facebook Get Current User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: string
          description: Comma-separated list of fields to return.
    - name: user-id
      path: /{user-id}
      operations:
      - name: getuser
        method: GET
        description: Facebook Get User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user-id
          in: path
          type: string
          description: The user ID.
          required: true
        - name: fields
          in: query
          type: string
          description: Comma-separated list of fields to return.
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_API_KEY}}'
  exposes:
  - type: rest
    namespace: graph-users-rest
    port: 8080
    description: REST adapter for Facebook Graph API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/me
      name: me
      description: REST surface for me.
      operations:
      - method: GET
        name: getcurrentuser
        description: Facebook Get Current User
        call: graph-users.getcurrentuser
        with:
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{user-id}
      name: user-id
      description: REST surface for user-id.
      operations:
      - method: GET
        name: getuser
        description: Facebook Get User
        call: graph-users.getuser
        with:
          user-id: rest.user-id
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: graph-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook Graph API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: facebook-get-current-user
      description: Facebook Get Current User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: graph-users.getcurrentuser
      with:
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-get-user
      description: Facebook Get User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: graph-users.getuser
      with:
        user-id: tools.user-id
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
