naftiko: 1.0.0-alpha2
info:
  label: Facebook Marketing API — Campaigns
  description: 'Facebook Marketing API — Campaigns. 3 operations. Lead operation: Facebook List Campaigns. Self-contained
    Naftiko capability covering one Facebook business surface.'
  tags:
  - Facebook
  - Campaigns
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_API_KEY: FACEBOOK_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-campaigns
    baseUri: https://graph.facebook.com/v21.0
    description: Facebook Marketing API — Campaigns business capability. Self-contained, no shared references.
    resources:
    - name: act_{ad-account-id}-campaigns
      path: /act_{ad-account-id}/campaigns
      operations:
      - name: listcampaigns
        method: GET
        description: Facebook List Campaigns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ad-account-id
          in: path
          type: string
          description: The ad account ID.
          required: true
        - name: limit
          in: query
          type: integer
          description: Maximum number of campaigns to return.
      - name: createcampaign
        method: POST
        description: Facebook Create Campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ad-account-id
          in: path
          type: string
          description: The ad account ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: campaign-id
      path: /{campaign-id}
      operations:
      - name: getcampaign
        method: GET
        description: Facebook Get Campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: campaign-id
          in: path
          type: string
          description: The campaign ID.
          required: true
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_API_KEY}}'
  exposes:
  - type: rest
    namespace: marketing-campaigns-rest
    port: 8080
    description: REST adapter for Facebook Marketing API — Campaigns. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/act-ad-account-id/campaigns
      name: act-ad-account-id-campaigns
      description: REST surface for act_{ad-account-id}-campaigns.
      operations:
      - method: GET
        name: listcampaigns
        description: Facebook List Campaigns
        call: marketing-campaigns.listcampaigns
        with:
          ad-account-id: rest.ad-account-id
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcampaign
        description: Facebook Create Campaign
        call: marketing-campaigns.createcampaign
        with:
          ad-account-id: rest.ad-account-id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{campaign-id}
      name: campaign-id
      description: REST surface for campaign-id.
      operations:
      - method: GET
        name: getcampaign
        description: Facebook Get Campaign
        call: marketing-campaigns.getcampaign
        with:
          campaign-id: rest.campaign-id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-campaigns-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook Marketing API — Campaigns. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: facebook-list-campaigns
      description: Facebook List Campaigns
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-campaigns.listcampaigns
      with:
        ad-account-id: tools.ad-account-id
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-create-campaign
      description: Facebook Create Campaign
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-campaigns.createcampaign
      with:
        ad-account-id: tools.ad-account-id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-get-campaign
      description: Facebook Get Campaign
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-campaigns.getcampaign
      with:
        campaign-id: tools.campaign-id
      outputParameters:
      - type: object
        mapping: $.
