aid: facebook
name: Facebook
description: >-
  Facebook is Meta's social networking platform providing APIs for developers
  to integrate with Facebook's ecosystem. The Facebook Graph API is the primary
  way to read and write data to the Facebook social graph, enabling access to
  posts, users, pages, and other social data.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Social Media
  - Advertising
  - Authentication
  - Messaging
url: https://developers.facebook.com
created: '2024-01-15'
modified: '2026-03-16'
position: Consumer
access: 3rd-Party
specificationVersion: '0.19'
apis:
  - aid: facebook:facebook-graph-api
    name: Facebook Graph API
    description: >-
      The primary way to read and write data to the Facebook social graph,
      providing access to user profiles, posts, pages, and social interactions.
    humanURL: https://developers.facebook.com/docs/graph-api
    baseURL: https://graph.facebook.com
    tags:
      - Social
      - Graph
      - Posts
      - Users
    properties:
      - type: Documentation
        url: https://developers.facebook.com/docs/graph-api/overview
      - type: Authentication
        url: https://developers.facebook.com/docs/facebook-login/access-tokens
  - aid: facebook:facebook-marketing-api
    name: Facebook Marketing API
    description: >-
      Programmatically manage Facebook ad campaigns, Custom Audiences, and
      advertising reports.
    humanURL: https://developers.facebook.com/docs/marketing-apis
    baseURL: https://graph.facebook.com
    tags:
      - Advertising
      - Marketing
      - Campaigns
    properties:
      - type: Documentation
        url: https://developers.facebook.com/docs/marketing-api
common:
  - type: Portal
    url: https://developers.facebook.com
  - type: GettingStarted
    url: https://developers.facebook.com/docs/development/create-an-app
  - type: ChangeLog
    url: https://developers.facebook.com/docs/graph-api/changelog
  - type: Status
    url: https://developers.facebook.com/status
  - type: TermsOfService
    url: https://developers.facebook.com/terms
  - type: PrivacyPolicy
    url: https://developers.facebook.com/policy
  - type: RateLimits
    url: https://developers.facebook.com/docs/graph-api/overview/rate-limiting
  - type: GitHubOrganization
    url: https://github.com/facebook
