specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Facebook
providerId: facebook
publisherName: Meta Platforms, Inc.
serviceCategory: Advertising / Social Media
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Advertising
  - Content Publishing
  - Messaging
  - Social Media
  - Social Networking
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for Facebook (Meta) APIs: the Graph and Marketing APIs are free at
  the API layer; spend is downstream — ad campaign budgets billed by Meta Ads, and per-conversation pricing
  for WhatsApp Business. API-level FinOps focuses on quota burn (rate-limit headers) rather than direct
  API charges.'
sources:
  - https://developers.facebook.com/docs/graph-api/overview/rate-limiting
  - https://www.facebook.com/business/ads/pricing
  - https://developers.facebook.com/docs/whatsapp/pricing
principles:
  - name: Visibility
    description: Read X-App-Usage, X-Business-Use-Case-Usage, X-Ad-Account-Usage, and X-Page-Usage on every
      response and feed those percentages into a dashboard so quota burn is observable per app and per
      ad account.
  - name: Allocation
    description: Tag each Graph/Marketing call with the consuming app, ad account, page, and team; Meta
      Ads spend is naturally allocated by ad account and campaign in Ads Manager.
  - name: Optimization
    description: Batch Graph API calls (use ?fields=, batch endpoint, or webhook subscriptions) to keep
      total_cputime low; reduce User Errors to preserve the Standard-tier Ads Insights ceiling; route
      WhatsApp messages through the customer-service window when possible (free service conversations).
  - name: Accountability
    description: Per-app owners own the App Review tier; per-ad-account owners own campaign spend; per-WhatsApp-business-account
      owners own conversation spend. Reconcile Meta Ads invoices and WhatsApp conversation reports monthly.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: Free API + Downstream Ad Spend + Per-Conversation Messaging
  billingFrequency: Monthly
  billingCurrency: USD (settlement varies by country)
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Facebook (Meta) APIs
  ServiceCategory: Advertising / Social Media
  ProviderName: Meta
  PublisherName: Meta Platforms, Inc.
  InvoiceIssuerName: Meta Platforms, Inc.
  PricingCategory: Free API + Usage (downstream)
  PricingUnit: varies (impression, conversation, ad-spend USD)
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: graph_api_calls
    description: Count of Graph/Marketing API calls; not directly billed but counts against rate-limit
      formulas.
    unit: call
    aggregation: sum
    dimensions:
      - app
      - business_id
      - ad_account
      - endpoint
  - name: ad_spend
    description: Ad campaign spend billed via Meta Ads.
    unit: USD
    aggregation: sum
    dimensions:
      - ad_account
      - campaign
      - placement
      - country
  - name: whatsapp_conversations
    description: 24-hour WhatsApp Business conversations, billed by category and country.
    unit: conversation
    aggregation: sum
    dimensions:
      - waba_id
      - category
      - country
  - name: app_usage_pct
    description: X-App-Usage percentage (call_count / total_cputime / total_time) — operational meter
      for throttling proximity.
    unit: percent
    aggregation: max
    dimensions:
      - app
