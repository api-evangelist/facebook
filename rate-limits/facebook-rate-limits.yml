specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Facebook
providerId: facebook
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Advertising
  - Content Publishing
  - Messaging
  - Social Media
  - Social Networking
  - Rate Limiting
description: Facebook (Meta) enforces rate limits at multiple layers — Platform (App + User), Business
  Use Case (BUC), Pages, Messenger, and Instagram. Platform limits are formula-based and scale with active
  daily users or active ads. BUC limits depend on the App Review access tier (Development, Standard, Advanced).
  Limits are documented in the Graph API rate-limiting reference.
sources:
  - https://developers.facebook.com/docs/graph-api/overview/rate-limiting
  - https://developers.facebook.com/docs/marketing-api/overview/authorization
headers:
  appUsage: X-App-Usage
  businessUseCaseUsage: X-Business-Use-Case-Usage
  adAccountUsage: X-Ad-Account-Usage
  pageUsage: X-Page-Usage
responseCodes:
  appLimitReached: 4
  userLimitReached: 17
  pagesLimitReached: 32
  customRateLimit: 613
  throttled: 429
limits:
  - name: App-level (Platform)
    scope: app
    metric: calls_per_hour
    limit: 'Calls within one hour = 200 * Number of Users'
    notes: Number of Users is a count of unique daily-active users for the app; throttling triggers when
      X-App-Usage call_count, total_cputime, or total_time hits 100%.
  - name: User-level (Platform)
    scope: user
    metric: calls_per_hour
    limit: 'undisclosed (privacy)'
    notes: Counted across all apps a user interacts with; specific numeric ceiling not published by Meta.
  - name: Ads Insights — Standard Access (BUC)
    scope: business
    metric: calls_per_hour
    limit: 'Calls within one hour = 600 + 400 * Number of Active ads - 0.001 * User Errors'
  - name: Ads Insights — Advanced Access (BUC)
    scope: business
    metric: calls_per_hour
    limit: 'Calls within one hour = 190000 + 400 * Number of Active ads'
  - name: Ads Management — Standard Access (BUC)
    scope: business
    metric: calls_per_hour
    limit: 'Calls within one hour = 300 + 40 * Number of Active ads'
  - name: Ads Management — Advanced Access (BUC)
    scope: business
    metric: calls_per_hour
    limit: 'Calls within one hour = 100000 + 40 * Number of Active ads'
  - name: Custom Audience — Standard Access (BUC)
    scope: business
    metric: calls_per_hour
    limit: 'Calls within one hour = 5000 + 40 * Number of Active Custom Audiences (capped at 700,000)'
  - name: Custom Audience — Advanced Access (BUC)
    scope: business
    metric: calls_per_hour
    limit: 'Calls within one hour = 190000 + 40 * Number of Active Custom Audiences'
  - name: Pages API
    scope: page
    metric: calls_per_24h
    limit: 'Calls within 24 hours = 4800 * Number of Engaged Users'
  - name: Messenger Platform
    scope: page
    metric: calls_per_24h
    limit: 'Calls within 24 hours = 200 * Number of Engaged Users'
  - name: Instagram Platform
    scope: account
    metric: calls_per_24h
    limit: 'Calls within 24 hours = 4800 * Number of Impressions'
  - name: Lead Ads (LeadGen)
    scope: business
    metric: calls_per_24h
    limit: 'Calls within 24 hours = 4800 * Leads Generated'
policies:
  - name: Tiered access via App Review
    description: Apps default to Development Access. To access Standard or Advanced rate ceilings, submit
      the corresponding feature for App Review and complete Business Verification.
  - name: Header-based observability
    description: Inspect X-App-Usage, X-Business-Use-Case-Usage, X-Ad-Account-Usage, and X-Page-Usage on
      every response. When call_count, total_cputime, or total_time reaches 100, requests are throttled
      until the value drops.
  - name: Backoff on throttle
    description: When throttled, parse estimated_time_to_regain_access from X-Business-Use-Case-Usage and
      sleep at least that many minutes. Use exponential backoff with jitter for transient errors.
  - name: Error-code dispatch
    description: 'Code 4 = app limit; code 17 = user limit; code 32 = page-level; code 613 = custom limit;
      80001-80014 = BUC-specific. Treat each class with its own backoff window.'
  - name: Reduce User Errors
    description: The Standard-tier Ads Insights formula subtracts 0.001 * User Errors per hour, so consistently
      malformed requests permanently lower the ceiling.
maintainers:
